<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>


    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <!-- Section to display base64 image -->
    <section id="base64-image-section">
      <h3>Base64 Image Preview</h3>
      <input type="text" id="base64-input" placeholder="Paste base64 string here" style="width:100%" />
      <button id="show-image-btn">Show Image</button>
      <div id="image-preview" style="margin-top:1em;"></div>
    </section>

    <script src="app.js"></script>
  </body>
</html>
